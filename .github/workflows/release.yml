name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0). Required for manual runs."
        required: true
        type: string

jobs:
  build:
    name: Build Windows installers
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Build & bundle (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Sumgim ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: |
            ## 다운로드
            - **MSI**: 깔끔한 설치 (권장, 기업 환경)
            - **NSIS EXE**: 일반 사용자

            > 코드 서명이 없는 빌드라 SmartScreen 경고가 뜰 수 있습니다.
            > "추가 정보 → 실행"으로 진행하세요.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false
          args: --target x86_64-pc-windows-msvc
